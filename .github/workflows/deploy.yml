name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "::error::Missing required secrets. Please set CF_API_TOKEN and CF_ACCOUNT_ID in repository Settings → Secrets → Actions."
            exit 1
          fi

      - name: Prepare wrangler config
        run: cp wrangler.toml.example wrangler.toml

      - name: Install dependencies
        run: npm ci

      - name: Create D1 database (idempotent)
        run: npx wrangler d1 create fishblog-db 2>&1 || echo "Database already exists, skipping."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Resolve D1 database ID
        run: |
          DB_LIST=$(npx wrangler d1 list --json 2>&1)
          DB_ID=$(echo "$DB_LIST" | node -e "
            let input = '';
            process.stdin.on('data', c => input += c);
            process.stdin.on('end', () => {
              try {
                const dbs = JSON.parse(input);
                const db = dbs.find(d => d.name === 'fishblog-db');
                if (db) process.stdout.write(db.uuid);
                else { console.error('Database fishblog-db not found'); process.exit(1); }
              } catch(e) {
                console.error('Failed to parse D1 list output:', input.slice(0, 500));
                process.exit(1);
              }
            });
          ")
          if [ -z "$DB_ID" ]; then
            echo "::error::Could not resolve D1 database ID. Check your CF_API_TOKEN has D1 permissions."
            exit 1
          fi
          echo "Resolved database_id: $DB_ID"
          sed -i "s/placeholder-replace-after-creation/$DB_ID/" wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set admin secrets
        run: |
          echo "${{ secrets.ADMIN_USERNAME }}" | npx wrangler secret put ADMIN_USERNAME 2>&1 || true
          echo "${{ secrets.ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
